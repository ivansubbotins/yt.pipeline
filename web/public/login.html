<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — YouTube Pipeline</title>
<style>
:root {
  --bg: #0c0c0c;
  --card: #151515;
  --border: #262626;
  --text: #e8e8e8;
  --muted: #666;
  --blue: #3b82f6;
  --red: #ef4444;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 40px;
  width: 360px;
  max-width: 90vw;
}
.logo {
  text-align: center;
  margin-bottom: 24px;
}
.logo svg { opacity: 0.8; }
.logo h1 { font-size: 18px; margin-top: 8px; font-weight: 600; }
.logo p { font-size: 12px; color: var(--muted); margin-top: 4px; }
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.15s;
}
.field input:focus { border-color: var(--blue); }
.btn {
  width: 100%;
  padding: 10px;
  background: var(--blue);
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
}
.btn:hover { opacity: 0.9; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
.error {
  background: rgba(239,68,68,0.1);
  border: 1px solid rgba(239,68,68,0.3);
  color: var(--red);
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 12px;
  margin-bottom: 16px;
  display: none;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M22.5 7.5a2.5 2.5 0 00-1.8-1.8C19 5.3 12 5.3 12 5.3s-7 0-8.7.4a2.5 2.5 0 00-1.8 1.8A26 26 0 001 12a26 26 0 00.5 4.5 2.5 2.5 0 001.8 1.8c1.7.4 8.7.4 8.7.4s7 0 8.7-.4a2.5 2.5 0 001.8-1.8A26 26 0 0023 12a26 26 0 00-.5-4.5z"/>
      <path d="M10 15.5l5.5-3.5L10 8.5z"/>
    </svg>
    <h1>YouTube Pipeline</h1>
    <p>Войдите для доступа к панели</p>
  </div>

  <div class="error" id="error"></div>

  <form onsubmit="login(event)">
    <div class="field">
      <label>Логин</label>
      <input type="text" id="user" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="pass" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn" id="btn">Войти</button>
  </form>
</div>

<script>
async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Вход...';
  err.style.display = 'none';

  try {
    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user: document.getElementById('user').value,
        pass: document.getElementById('pass').value,
      }),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else {
      err.textContent = data.error || 'Ошибка входа';
      err.style.display = 'block';
    }
  } catch (ex) {
    err.textContent = 'Ошибка сети';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Войти';
}
</script>
</body>
</html>
