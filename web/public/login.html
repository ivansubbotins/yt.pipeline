<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход — Yt.Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/shared.css">
<style>
body {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface);
}
.login-card {
  background: var(--surface-container);
  border: 1px solid var(--outline-variant);
  border-radius: var(--radius-2xl);
  padding: 44px;
  width: 400px;
  max-width: 90vw;
  box-shadow: var(--shadow-xl);
}
.logo { text-align: center; margin-bottom: 32px; }
.logo-icon {
  width: 48px;
  height: 48px;
  border-radius: var(--radius-lg);
  background: linear-gradient(135deg, var(--primary), var(--primary-container));
  display: inline-flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
}
.logo h1 {
  font-size: 24px;
  font-weight: 900;
  letter-spacing: -0.05em;
  color: var(--primary);
  font-family: var(--font-headline);
}
.logo p {
  font-size: 12px;
  color: var(--on-surface-variant);
  margin-top: 6px;
  text-transform: uppercase;
  letter-spacing: 1.5px;
  font-weight: 600;
}
.field { margin-bottom: 18px; }
.field label { margin-bottom: 6px; }
.error {
  background: rgba(147,0,10,0.15);
  border: 1px solid rgba(255,180,171,0.3);
  color: var(--error);
  padding: 10px 14px;
  border-radius: var(--radius-md);
  font-size: 12px;
  margin-bottom: 18px;
  display: none;
}
.login-btn {
  width: 100%;
  padding: 12px;
  background: var(--primary-container);
  color: var(--on-primary-fixed);
  border: none;
  border-radius: var(--radius-md);
  font-size: 14px;
  font-weight: 700;
  font-family: var(--font-headline);
  cursor: pointer;
  transition: all 0.15s;
  box-shadow: 0 4px 16px rgba(77,142,255,0.25);
}
.login-btn:hover { box-shadow: 0 6px 24px rgba(77,142,255,0.35); filter: brightness(1.05); }
.login-btn:active { transform: scale(0.98); }
.login-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; filter: none; }
</style>
</head>
<body>
<div class="login-card">
  <div class="logo">
    <div class="logo-icon">
      <span class="material-symbols-outlined" style="font-size:24px;color:var(--on-primary);font-variation-settings:'FILL' 1;">plumbing</span>
    </div>
    <h1>Yt.Pipeline</h1>
    <p>Ops Center</p>
  </div>

  <div class="error" id="error"></div>

  <form onsubmit="login(event)">
    <div class="field">
      <label>Логин</label>
      <input type="text" id="user" autocomplete="username" autofocus required>
    </div>
    <div class="field">
      <label>Пароль</label>
      <input type="password" id="pass" autocomplete="current-password" required>
    </div>
    <div class="field" id="totpField" style="display:none;">
      <label>Код 2FA (Google Authenticator)</label>
      <input type="text" id="totp" autocomplete="one-time-code" inputmode="numeric" maxlength="6" placeholder="000000" style="text-align:center;font-size:20px;letter-spacing:8px;font-weight:700;">
    </div>
    <button type="submit" class="login-btn" id="btn">Войти</button>
  </form>
</div>

<script>
let needTotp = false;

// Check if 2FA is enabled
fetch('/api/2fa/status').then(r => r.json()).then(d => {
  if (d.enabled) {
    document.getElementById('totpField').style.display = '';
    needTotp = true;
  }
});

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('error');
  btn.disabled = true;
  btn.textContent = 'Вход...';
  err.style.display = 'none';

  try {
    const body = {
      user: document.getElementById('user').value,
      pass: document.getElementById('pass').value,
    };
    const totpInput = document.getElementById('totp');
    if (totpInput.value) body.totp = totpInput.value;

    const res = await fetch('/api/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/';
    } else if (data.need_totp) {
      // Show TOTP field
      document.getElementById('totpField').style.display = '';
      document.getElementById('totp').focus();
      err.textContent = 'Введите код из Google Authenticator';
      err.style.display = 'block';
      err.style.background = 'rgba(173,198,255,0.1)';
      err.style.borderColor = 'rgba(173,198,255,0.3)';
      err.style.color = 'var(--primary)';
    } else {
      err.textContent = data.error || 'Ошибка входа';
      err.style.display = 'block';
      err.style.background = 'rgba(147,0,10,0.15)';
      err.style.borderColor = 'rgba(255,180,171,0.3)';
      err.style.color = 'var(--error)';
    }
  } catch (ex) {
    err.textContent = 'Ошибка сети';
    err.style.display = 'block';
  }
  btn.disabled = false;
  btn.textContent = 'Войти';
}
</script>
</body>
</html>
